name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run core skill trigger tests
        run: npm run test:skills:core
      - name: Run constraints skill trigger tests
        run: npm run test:skills:constraints
      - name: Run hook smoke tests
        run: npm run test:hooks:smoke


  tabler-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate local Tabler icons
        run: python tools/check_tabler_icons.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      # 启动 relay server
      - name: Start relay server
        run: |
          cd packages/relay-server
          bun run src/index.ts &
          sleep 2
          curl -f http://localhost:3000/health

      # 启动 CLI 配对
      - name: Start CLI pairing
        run: |
          cd packages/cli
          bun run src/index.ts --server http://localhost:3000 --pair > /tmp/cli-output.txt 2>&1 &
          sleep 3
          PAIRING_CODE=$(grep -oP '\d{3}-\d{3}' /tmp/cli-output.txt | head -1)
          echo "PAIRING_CODE=$PAIRING_CODE" >> $GITHUB_ENV

      # 运行 E2E 测试
      - name: Run E2E test
        run: |
          cd packages/cli
          bun run src/test-e2e.ts \
            --pairing-code ${{ env.PAIRING_CODE }} \
            --server http://localhost:3000 \
            --prompt "say hello"
        timeout-minutes: 2
