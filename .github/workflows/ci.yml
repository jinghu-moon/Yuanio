name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tabler-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate local Tabler icons
        run: python tools/check_tabler_icons.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck

  android-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check Android guard suite
        run: python tools/check_android_guards.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android-app/gradlew

      - name: Assemble debug
        working-directory: android-app
        run: ./gradlew assembleDebug --console=plain

      - name: Lint debug
        working-directory: android-app
        run: ./gradlew :app:lintFullDebug --console=plain

      - name: Compile androidTest sources
        working-directory: android-app
        run: ./gradlew :app:compileDebugAndroidTestKotlin --console=plain

      - name: Run focused Android unit tests
        working-directory: android-app
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "*BrandIconsTest" \
            --tests "*ApprovalCardTest" \
            --tests "*ChatMessageListBehaviorTest" \
            --tests "*TerminalPerformanceTest" \
            --console=plain

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      JWT_SECRET: ci-jwt-secret-0123456789-abcdefghijklmnopqrstuvwxyz
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      - name: Start relay server
        run: |
          cd packages/relay-server
          bun run src/index.ts &
          sleep 2
          curl -f http://localhost:3000/health

      - name: Run E2E test with mock agent
        run: |
          cd packages/cli
          bun run src/run-e2e-with-mock.ts \
            --server http://localhost:3000 \
            --prompt "say hello"
        timeout-minutes: 2
