name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run core skill trigger tests
        run: npm run test:skills:core
      - name: Run constraints skill trigger tests
        run: npm run test:skills:constraints
      - name: Run hook smoke tests
        run: npm run test:hooks:smoke

  tabler-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate local Tabler icons
        run: python tools/check_tabler_icons.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck

  e2e:
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      JWT_SECRET: ci-jwt-secret-0123456789-abcdefghijklmnopqrstuvwxyz
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      - name: Start relay server
        run: |
          cd packages/relay-server
          bun run src/index.ts &
          sleep 2
          curl -f http://localhost:3000/health

      - name: Run E2E test with mock agent
        run: |
          cd packages/cli
          bun run src/run-e2e-with-mock.ts \
            --server http://localhost:3000 \
            --prompt "say hello"
        timeout-minutes: 2
